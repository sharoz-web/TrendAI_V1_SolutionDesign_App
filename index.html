document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rance:none;margin:0;}\n  *::-webkit-scrollbar{width:10px;height:10px;}\n  *::-webkit-scrollbar-track{background:#0C0E11;}\n  *::-webkit-scrollbar-thumb{background:#2A2F36;border-radius:6px;}\n  *::-webkit-scrollbar-thumb:hover{background:#3A4049;}\n  .tabscroll::-webkit-scrollbar{height:0;}\n<\u002Fstyle>\n<script src=\"dfbd610e-fc0d-48f5-8d73-be7876e4d3a4\"><\u002Fscript>\n<\u002Fhelmet>\n\n\n<div style=\"min-height:100vh;background:#000;background-image:radial-gradient(62% 48% at 88% -4%, rgba(215,25,32,0.20) 0%, rgba(0,0,0,0) 58%),radial-gradient(40% 40% at 8% 6%, rgba(255,149,0,0.07) 0%, rgba(0,0,0,0) 60%);font-family:'Work Sans',system-ui,sans-serif;color:#fff;-webkit-font-smoothing:antialiased;padding-bottom:90px;\">\n\n  <!-- HEADER -->\n  <header style=\"max-width:1120px;margin:0 auto;padding:calc(34px + env(safe-area-inset-top, 0px)) 22px 0;\">\n    <div style=\"display:flex;align-items:center;gap:13px;\">\n      <img src=\"0bfd4a22-a24d-4459-bdd6-8464a6441452\" alt=\"TrendAI\" style=\"height:28px;width:auto;display:block;\">\n      <span style=\"width:1px;height:22px;background:#2A2F36;\"><\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:0.2em;text-transform:uppercase;color:#8A929C;\">Flex · Presales Tooling<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#D71920;margin-top:30px;\">Credits Quoting Suite · July V2<\u002Fdiv>\n    <h1 style=\"font-family:'Onest','Helvetica Neue',Arial,sans-serif;font-weight:800;font-size:clamp(30px,5vw,50px);line-height:1.02;letter-spacing:-0.03em;margin:11px 0 0;max-width:20ch;\">TrendAI Flex <span style=\"{{ gradStyle }}\">Credit Calculator<\u002Fspan><\u002Fh1>\n    <p style=\"font-size:16px;line-height:1.5;color:#B5BCC4;max-width:64ch;margin:14px 0 0;text-wrap:pretty;\">Build quotes, estimate trial &amp; upgrade credits, and size Agentic SIEM log costs — all rates from the V2 internal price list.<\u002Fp>\n  <\u002Fheader>\n\n  <!-- TABS -->\n  <div style=\"position:sticky;top:0;z-index:30;background:linear-gradient(180deg,#000 70%,rgba(0,0,0,0));padding-top:18px;margin-top:24px;\">\n    <div class=\"tabscroll\" style=\"max-width:1120px;margin:0 auto;padding:0 22px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;\">\n      <div style=\"display:flex;gap:8px;width:max-content;\">\n        <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"6\">\n          <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\" style-hover=\"{{ t.hover }}\">{{ t.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1120px;margin:0 auto;padding:6px 22px 0;\">\n\n    <!-- ===== QUOTE BUILDER ===== -->\n    <sc-if value=\"{{ isQuote }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"{{ cardStyle }}\">\n      <span style=\"{{ tagStyle }}\">Multi-Solution Quote<\u002Fspan>\n      <h2 style=\"{{ h2Style }}\">Quote Builder<\u002Fh2>\n      <p style=\"{{ subStyle }}\">Add solutions, set units and term, and get the total TrendAI Flex credits required — mirrors the workbook's master calculator.<\u002Fp>\n\n      <!-- add row -->\n      <div style=\"background:#0C0E11;border:1px solid #2A2F36;border-radius:12px;padding:16px;margin-top:6px;\">\n        <label style=\"{{ labelStyle }}\">Add a solution / package<\u002Flabel>\n        <select value=\"{{ qPick }}\" onchange=\"{{ onQPick }}\" style=\"{{ inputStyle }}\" style-focus=\"{{ focusStyle }}\">\n          <sc-for list=\"{{ optgroups }}\" as=\"g\" hint-placeholder-count=\"9\">\n            <optgroup label=\"{{ g.cat }}\">\n              <sc-for list=\"{{ g.items }}\" as=\"it\" hint-placeholder-count=\"4\"><option value=\"{{ it.name }}\">{{ it.label }}<\u002Foption><\u002Fsc-for>\n            <\u002Foptgroup>\n          <\u002Fsc-for>\n        <\u002Fselect>\n        <div style=\"display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;align-items:flex-end;\">\n          <div style=\"flex:1;min-width:120px;\">\n            <label style=\"{{ labelStyle }}\">Units<\u002Flabel>\n            <input type=\"number\" min=\"0\" step=\"any\" value=\"{{ qUnits }}\" oninput=\"{{ onQUnits }}\" style=\"{{ inputStyle }}\" style-focus=\"{{ focusStyle }}\">\n          <\u002Fdiv>\n          <div style=\"flex:1;min-width:120px;\">\n            <label style=\"{{ labelStyle }}\">Months<\u002Flabel>\n            <input type=\"number\" min=\"0\" step=\"any\" value=\"{{ qMonths }}\" oninput=\"{{ onQMonths }}\" style=\"{{ inputStyle }}\" style-focus=\"{{ focusStyle }}\">\n          <\u002Fdiv>\n          <button onclick=\"{{ addLine }}\" style=\"{{ addBtnStyle }}\" style-hover=\"transform:translateY(-1px);\">+ Add line<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"{{ hintStyle }}\">{{ qPickHint }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- lines -->\n      <sc-if value=\"{{ hasLines }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"margin-top:18px;display:flex;flex-direction:column;gap:10px;\">\n        <sc-for list=\"{{ qRows }}\" as=\"ln\" hint-placeholder-count=\"2\">\n          <div style=\"background:#0C0E11;border:1px solid #2A2F36;border-radius:12px;padding:14px 14px 12px;\">\n            <div style=\"display:flex;justify-content:space-between;gap:12px;align-items:flex-start;\">\n              <div style=\"font-size:13.5px;color:#DCE0E5;font-weight:500;line-height:1.35;\">{{ ln.name }}<\u002Fdiv>\n              <button onclick=\"{{ ln.onRemove }}\" style=\"background:none;border:none;color:#5A626D;cursor:pointer;font-size:18px;line-height:1;padding:0 2px;flex:0 0 auto;\" style-hover=\"color:#FF6E76;\">×<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color:#5A626D;margin-top:4px;\">{{ ln.rateLabel }}<\u002Fdiv>\n            <div style=\"display:flex;gap
